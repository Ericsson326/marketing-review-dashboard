<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>营销内容排期 · 第二版本</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="version-line">
            <p class="eyebrow">Marketing Review</p>
            <span class="version-badge">第二版本</span>
          </div>
          <h1>营销内容排期</h1>
          <p class="subtitle">上传日历截图，自动整理日期与内容，再统一跟进审核进度。</p>
        </div>

        <section class="summary" aria-label="今日概览">
          <div>
            <span id="totalCount">0</span>
            <small>全部排期</small>
          </div>
          <div>
            <span id="pendingCount">0</span>
            <small>待审核</small>
          </div>
          <div>
            <span id="doneCount">0</span>
            <small>已完成</small>
          </div>
        </section>

        <form id="contentForm" class="entry-form">
          <label>
            内容标题
            <input id="titleInput" type="text" placeholder="例如：618 护肤套装小红书图文" required />
          </label>
          <label>
            渠道
            <select id="channelInput">
              <option>小红书</option>
              <option>抖音</option>
              <option>微信视频号</option>
              <option>朋友圈</option>
              <option>公众号</option>
              <option>门店物料</option>
            </select>
          </label>
          <label>
            负责人
            <input id="ownerInput" type="text" placeholder="例如：Lynn" />
          </label>
          <label>
            发布时间
            <input id="timeInput" type="time" value="18:00" />
          </label>
          <label>
            排期日期
            <input id="dateInput" type="date" required />
          </label>
          <button type="submit">＋ 新增排期内容</button>
        </form>

        <div class="pokemon-slowpoke-wrap" aria-hidden="true">
          <img
            class="pokemon-character pokemon-slowpoke"
            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/79.png"
            alt=""
          />
          <span>慢慢想，也可以很有创意。</span>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="heading-with-pikachu">
            <div>
              <p id="todayLabel" class="date-label"></p>
              <h2>审核与排期看板</h2>
              <p class="workspace-subtitle">按发布日期排序，适合每日站会、发布前检查和多人协作确认。</p>
            </div>
            <img
              class="pokemon-character pokemon-pikachu"
              src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
              alt="皮卡丘"
            />
          </div>
          <div class="topbar-actions">
            <button id="openScannerButton" class="scan-button" type="button">扫描营销日历</button>
            <div class="view-tools" role="group" aria-label="筛选内容">
              <button class="filter-button is-active" type="button" data-filter="全部">全部</button>
              <button class="filter-button" type="button" data-filter="待审核">
                <span class="filter-symbol pending-symbol" aria-hidden="true">⚡</span>待审核
              </button>
              <button class="filter-button" type="button" data-filter="已完成">
                <span class="filter-symbol done-symbol" aria-hidden="true">✓</span>已完成
              </button>
            </div>
          </div>
        </header>

        <section class="pipeline" aria-label="流程阶段">
          <div class="step">
            <span>1</span>
            <strong>刚刚开始</strong>
          </div>
          <div class="step">
            <span>2</span>
            <strong>已写文案</strong>
          </div>
          <div class="step">
            <span>3</span>
            <strong>有初稿图片</strong>
          </div>
          <div class="step">
            <span>4</span>
            <strong>待审核</strong>
          </div>
          <div class="step">
            <span>5</span>
            <strong>已完成</strong>
          </div>
        </section>

        <section id="contentList" class="content-list" aria-live="polite"></section>
      </section>
    </main>

    <template id="contentCardTemplate">
      <article class="content-card">
        <div class="card-main">
          <div class="channel-mark" aria-hidden="true"></div>
          <div class="card-copy">
            <div class="card-title-row">
              <h3></h3>
              <span class="status-pill"></span>
            </div>
            <p class="meta"></p>
            <div class="progress-track" aria-hidden="true">
              <span></span>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <select class="status-select" aria-label="修改状态"></select>
          <button class="delete-button" type="button" aria-label="删除内容">删除</button>
        </div>
      </article>
    </template>

    <dialog id="scanDialog" class="scan-dialog">
      <form method="dialog" class="dialog-head">
        <div>
          <p class="eyebrow">Calendar Scanner</p>
          <h2>导入营销日历截图</h2>
          <p>图片只在当前浏览器识别。导入前可以修改识别结果。</p>
        </div>
        <button class="close-button" value="cancel" aria-label="关闭">×</button>
      </form>
      <div class="scan-body">
        <label class="drop-zone" for="calendarImages">
          <strong>选择或拖入日历截图</strong>
          <span>支持 PNG、JPG、WEBP，可一次选择多张</span>
          <input id="calendarImages" type="file" accept="image/png,image/jpeg,image/webp" multiple />
        </label>
        <div id="scanProgress" class="scan-progress" hidden>
          <div><span id="scanProgressBar"></span></div>
          <p id="scanProgressText">准备识别...</p>
        </div>
        <section id="scanPreview" class="scan-preview" hidden>
          <div class="preview-head">
            <div><h3>识别结果</h3><p>请确认日期和内容，再加入排期。</p></div>
            <button id="addPreviewRow" class="secondary-button" type="button">新增一行</button>
          </div>
          <div id="previewRows" class="preview-rows"></div>
          <button id="importScheduleButton" class="import-button" type="button">确认并加入排期</button>
        </section>
      </div>
    </dialog>
    <template id="previewRowTemplate">
      <div class="preview-row">
        <input class="preview-date" type="date" aria-label="排期日期" />
        <input class="preview-title" type="text" placeholder="排期内容" aria-label="排期内容" />
        <select class="preview-channel" aria-label="渠道">
          <option>小红书</option><option>抖音</option><option>微信视频号</option>
          <option>朋友圈</option><option>公众号</option><option>门店物料</option><option>其他</option>
        </select>
        <button class="remove-preview-row" type="button" aria-label="移除">×</button>
      </div>
    </template>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
